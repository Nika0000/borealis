name: Build borealis demo

on:
  push:
    paths:
      - "library/**"
      - "demo/**"
      - "resources/**"
      - "android-project/**"
      - "ps4/**"
      - "psv/**"
      - "winrt/**"
      - "CMakeLists.txt"
      - "**/*.cmake"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "library/**"
      - "demo/**"
      - "resources/**"
      - "android-project/**"
      - "ps4/**"
      - "psv/**"
      - "winrt/**"
      - "CMakeLists.txt"
      - "**/*.cmake"
      - ".github/workflows/ci.yaml"
jobs:
  windows:
    name: windows (${{ matrix.driver }}${{ matrix.ext }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { driver: gl3, cmake: "-DUSE_SDL3=ON", ext: "-sdl3" }
          - { driver: gl3, cmake: "-DUSE_GLFW=ON", ext: "-glfw" }
          - {
              driver: d3d11,
              cmake: "-DUSE_D3D11=ON -DUSE_SDL3=ON",
              ext: "-sdl3",
            }
          - {
              driver: d3d11,
              cmake: "-DUSE_D3D11=ON -DUSE_GLFW=ON",
              ext: "-glfw",
            }
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          cache: false
          release: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cc
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -G Ninja ${{ matrix.cmake }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM_DESKTOP=ON \
            -DWIN32_TERMINAL=OFF \
            -DUSE_LIBROMFS=ON \
            -DZLIB_USE_STATIC_LIBS=ON
          cmake --build build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: borealis-windows-x86_64-${{ matrix.driver }}${{ matrix.ext }}
          path: build/borealis_demo.exe

