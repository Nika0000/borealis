<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas#canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-status {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 16px;
        }

        #loading-progress {
            width: 240px;
            height: 4px;
            background: #2a2a4a;
            border-radius: 2px;
            overflow: hidden;
        }

        #loading-progress-bar {
            height: 100%;
            width: 0%;
            background: #6c63ff;
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        #error-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 200;
            color: #ff6b6b;
            font-size: 14px;
            padding: 24px;
            text-align: center;
        }

        #error-overlay.visible {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-status">Loading...</div>
        <div id="loading-progress">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <div id="error-overlay">
        <div id="error-message"></div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script>
        var loadingOverlay = document.getElementById('loading-overlay');
        var loadingStatus = document.getElementById('loading-status');
        var progressBar = document.getElementById('loading-progress-bar');
        var errorOverlay = document.getElementById('error-overlay');
        var errorMessage = document.getElementById('error-message');
        var canvasElement = document.getElementById('canvas');

        canvasElement.addEventListener('webglcontextlost', function(e) {
            e.preventDefault();
            errorMessage.textContent = 'WebGL context lost. Please reload the page.';
            errorOverlay.classList.add('visible');
        }, false);

        var Module = {
            canvas: canvasElement,
            print: function() {},
            printErr: function() {
                var args = Array.prototype.slice.call(arguments);
                console.error(args.join(' '));
            },
            setStatus: function(text) {
                if (!text) {
                    loadingOverlay.classList.add('hidden');
                    return;
                }
                var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (match) {
                    var pct = (parseInt(match[2]) / parseInt(match[4])) * 100;
                    progressBar.style.width = pct + '%';
                    loadingStatus.textContent = match[1].trim();
                } else {
                    loadingStatus.textContent = text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                if (left) {
                    var pct = ((this.totalDependencies - left) / this.totalDependencies) * 100;
                    progressBar.style.width = pct + '%';
                    loadingStatus.textContent = 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')';
                } else {
                    loadingStatus.textContent = 'Starting...';
                    progressBar.style.width = '100%';
                }
            }
        };

        Module.setStatus('Downloading...');

        window.onerror = function(msg) {
            errorMessage.textContent = 'Error: ' + msg;
            errorOverlay.classList.add('visible');
            loadingOverlay.classList.add('hidden');
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
